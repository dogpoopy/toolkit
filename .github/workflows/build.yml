name: Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]
      version:
        description: 'Version (release only)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sSL -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.14.0/gradle/wrapper/gradle-wrapper.jar" || true
          fi

      - name: Bump version (release)
        if: github.event.inputs.build_type == 'release'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CODE=$(echo $VERSION | awk -F. '{printf "%d%02d%02d",$1,(NF>1)?$2:0,(NF>2)?$3:0}')
          sed -i "s/versionCode = [0-9]*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

      - name: Create signing config (release)
        if: github.event.inputs.build_type == 'release'
        run: |
          mkdir -p ~/.gradle
          echo "${{ secrets.KEYSTORE_SECRET }}" | base64 -d > ~/key.jks
          echo "RELEASE_STORE_FILE=$(realpath ~/key.jks)"                   >  ~/.gradle/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PWD }}"        >> ~/.gradle/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                >> ~/.gradle/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PWD }}"               >> ~/.gradle/gradle.properties

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug'
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Build release APK
        if: github.event.inputs.build_type == 'release'
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub release
        if: github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Samsung Toolkit ${{ github.event.inputs.version }}
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## Samsung Toolkit v${{ github.event.inputs.version }}
            1. Download app-release.apk
            2. Enable Install from unknown sources if needed
            3. Install and enjoy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
